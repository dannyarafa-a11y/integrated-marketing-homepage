<style id="print-overrides">
  /* Force dark backgrounds + colors to render in print */
  html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  @media print {
    @page { size: A4 portrait; margin: 10mm; }

    /* Flatten fixed/sticky chrome so nothing overlaps or repeats */
    .nav { position: static !important; }
    .hiw-head { position: static !important; top: auto !important; }
    /* FAQ left column uses an inline sticky style */
    [style*="sticky"] { position: static !important; top: auto !important; }

    /* Recover hero spacing now that the nav is in-flow */
    .hero-banner { padding-top: 56px !important; }

    /* Hide interactive-only UI */
    .twk-panel, [class*="twk-"], .nav-cta { display: none !important; }

    /* Kill motion + hover artifacts */
    *, *::before, *::after {
      transition: none !important;
      animation: none !important;
    }

    /* Keep content blocks whole across page breaks */
    .section { break-inside: avoid; }
    .card, .svc-card, .ind-card, .price-card, .cs-card, .love-card,
    .love-mini, .stat-cell, .hiw-step, .faq-item, .roi-item,
    .founder, .playbook-card, .testi-card {
      break-inside: avoid;
    }
    h1, h2, h3 { break-after: avoid; }

    /* Let the timeline read as a static two-column block */
    .hiw-step-body { opacity: 1 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="sections-top.jsx"></script>
<script type="text/babel" src="sections-bottom.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  /* Auto-print once React has rendered and fonts are ready */
  (function () {
    function ready() {
      return document.querySelector('#root .hero') &&
             document.querySelectorAll('#root .section').length > 3;
    }
    function waitForRender() {
      return new Promise(function (resolve) {
        (function poll(n) {
          if (ready() || n > 100) return resolve();
          setTimeout(function () { poll(n + 1); }, 100);
        })(0);
      });
    }
    Promise.all([
      waitForRender(),
      (document.fonts ? document.fonts.ready : Promise.resolve())
    ]).then(function () {
      setTimeout(function () { window.print(); }, 600);
    });
  })();
</script>
</body>
</html>
